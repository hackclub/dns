name: contact-check

on:
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  contact-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3'

      - name: Install dependencies
        run: pip install ruamel.yaml

      - name: Check contact info on changed domains
        id: contact-check
        continue-on-error: true
        run: python3 bin/check-contact-info --base origin/${{ github.base_ref }}

      - name: Write PR feedback metadata
        if: steps.contact-check.outcome == 'failure'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p .github/pr-feedback/contact-check
          printf '%s\n' "$PR_NUMBER" > .github/pr-feedback/contact-check/pr_number
          printf '%s\n' "contact-check" > .github/pr-feedback/contact-check/type

      - name: Upload PR feedback metadata
        if: steps.contact-check.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pr-feedback-contact-check
          retention-days: 1
          path: |
            .github/pr-feedback/contact-check/pr_number
            .github/pr-feedback/contact-check/type

      - name: Fail if contact check failed
        if: steps.contact-check.outcome == 'failure'
        run: exit 1
